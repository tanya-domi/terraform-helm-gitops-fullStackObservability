# Install: pip install pre-commit && pre-commit install

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-added-large-files
        args: [--maxkb=4096]
      - id: detect-private-key

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.1
    hooks:
      - id: terraform_fmt
        files: ^infra/terraform/
      - id: terraform_validate
        files: ^infra/terraform/
        args:
          - --args=-backend=false

  - repo: local
    hooks:
      - id: helm-lint-charts
        name: helm lint service charts
        entry: bash -c 'for c in charts/frontend charts/cartservice charts/currencyservice charts/productcatalogservice charts/redis-cart; do helm lint "$c" || exit 1; done'
        language: system
        files: ^charts/
