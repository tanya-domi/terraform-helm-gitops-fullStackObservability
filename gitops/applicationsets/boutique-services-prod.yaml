apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: boutique-services-prod
  namespace: argocd
spec:
  generators:
    - matrix:
        generators:
          - list:
              elements:
                - env: prod
          - list:
              elements:
                - service: frontend
                  chart: charts/frontend
                - service: cartservice
                  chart: charts/cartservice
                - service: currencyservice
                  chart: charts/currencyservice
                - service: productcatalogservice
                  chart: charts/productcatalogservice
                - service: redis-cart
                  chart: charts/redis-cart
  template:
    metadata:
      name: "{{service}}-{{env}}"
    spec:
      project: boutique-platform
      source:
        repoURL: https://github.com/YOUR_GITHUB_ORG/micser-apps-GCP-Terraform-Helm-GitOps-monitoring.git
        targetRevision: main
        path: "{{chart}}"
        helm:
          releaseName: "{{service}}"
          valueFiles:
            - ../../gitops/envs/{{env}}/values-{{service}}.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{env}}"
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
