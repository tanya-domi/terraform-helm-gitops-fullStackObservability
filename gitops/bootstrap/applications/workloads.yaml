apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: boutique-workloads
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: boutique-platform
  source:
    repoURL: https://github.com/tanya-domi/terraform-helm-gitops-fullStackObservability
    targetRevision: main
    path: gitops/applicationsets
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
