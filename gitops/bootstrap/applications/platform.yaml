
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: boutique-platform
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: boutique-platform
  source:
    repoURL: https://github.com/tanya-domi/terraform-helm-gitops-fullStackObservability
    targetRevision: main
    path: gitops/platform
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true




