apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: boutique-kyverno-policies
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: boutique-platform
  source:
    repoURL: https://github.com/tanya-domi/terraform-helm-gitops-fullStackObservability
    targetRevision: main
    path: policies/kyverno
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
