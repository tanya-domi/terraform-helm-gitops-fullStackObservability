apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: boutique-root
  namespace: argocd
spec:
  project: boutique-platform
  source:
    repoURL: https://github.com/tanya-domi/terraform-helm-gitops-fullStackObservability
    targetRevision: main
    path: gitops/bootstrap/applications
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
