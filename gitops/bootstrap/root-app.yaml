apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-dependencies
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/tanya-domi/Full-Stack-Observability-for-Microservices.git'
    targetRevision: HEAD
    path: gitops/bootstrap/argocd-components
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true