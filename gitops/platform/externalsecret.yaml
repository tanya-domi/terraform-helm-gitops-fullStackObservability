# Application Layer (namespace: boutique)
# cartservice is configured to read REDIS_ADDR via a secretKeyRef

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: redis-secret-sync
  namespace: boutique
spec:
  refreshInterval: "5m"
  secretStoreRef:
    name: gcp-secret-store
    kind: ClusterSecretStore
  target:
    name: prod-redis-endpoint
    creationPolicy: Owner
  data:
    - secretKey: redis-endpoint
      remoteRef:
        key: prod-redis-endpoint
---
# Observability Layer (namespace: monitoring)
# OpenTelemetry collector or monitoring stack pulls from the same global store into its own namespace

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: otel-redis-secret-bridge
  namespace: monitoring
spec:
  refreshInterval: "5m"
  secretStoreRef:
    name: gcp-secret-store
    kind: ClusterSecretStore
  target:
    name: prod-redis-endpoint
    creationPolicy: Owner
  data:
    - secretKey: redis-endpoint
      remoteRef:
        key: prod-redis-endpoint # name of the secret as in Secret Manager