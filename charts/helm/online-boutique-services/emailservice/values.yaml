deploymentName: emailservice-deployment
serviceName: emailservice

appLabel: emailservice
appName: emailservice
jobLabel: emailservice

replicaCount: 1

image:
  repository: us-central1-docker.pkg.dev/project-1cdbea51-6334-4e02-967/app-images/emailservice
  tag: "v0.1.20"
  pullPolicy: IfNotPresent

annotations:
  instrumentation.opentelemetry.io/inject-python: "true"

containers:
  - name: server
    ports:
      - containerPort: 8080
    env:
      - name: PORT
        value: "8080"
      - name: DISABLE_PROFILER
        value: "1"
      - name: OTEL_SERVICE_NAME
        value: emailservice


    readinessProbe:
      periodSeconds: 5
      grpc:
        port: 8080
    livenessProbe:
      periodSeconds: 5
      grpc:
        port: 8080
    # resources:
    #   requests:
    #     cpu: 100m
    #     memory: 64Mi
    #   limits:
    #     cpu: 200m
    #     memory: 128Mi

    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

service:
  enabled: true
  type: ClusterIP
  name: grpc
  port: 5000
  targetPort: 8080

serviceAccount:
  create: true
  name: "emailservice"

profiler_enabled: "false"
