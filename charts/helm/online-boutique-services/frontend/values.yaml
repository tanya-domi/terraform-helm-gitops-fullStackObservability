deploymentName: frontend-deployment
serviceName: frontend

appLabel: frontend
appName: frontend
jobLabel: frontend

replicaCount: 1

image:
  repository: us-central1-docker.pkg.dev/project-1cdbea51-6334-4e02-967/app-images/frontend
  tag: "v0.1.20"
  pullPolicy: IfNotPresent

annotations:
  sidecar.istio.io/rewriteAppHTTPProbers: "true"
  instrumentation.opentelemetry.io/inject-go: "boutique/app-instrumentation"
  instrumentation.opentelemetry.io/otel-go-auto-target-exe: "/src/server"
  resource.opentelemetry.io/service.name: "frontend"

shareProcessNamespace: true
containers:
  - name: server
    ports:
      - containerPort: 8080
    securityContext:
          privileged: true
    readinessProbe:
      initialDelaySeconds: 10
      httpGet:
        path: "/_healthz"
        port: 8080
        httpHeaders:
          - name: "Cookie"
            value: "shop_session-id=x-readiness-probe"
    livenessProbe:
      initialDelaySeconds: 10
      httpGet:
        path: "/_healthz"
        port: 8080
        httpHeaders:
          - name: "Cookie"
            value: "shop_session-id=x-liveness-probe"
    env:
      - name: PORT
        value: "8080"
      - name: PRODUCT_CATALOG_SERVICE_ADDR
        value: "productcatalogservice:3550"
      - name: CURRENCY_SERVICE_ADDR
        value: "currencyservice:7000"
      - name: CART_SERVICE_ADDR
        value: "cartservice:7070"
      - name: RECOMMENDATION_SERVICE_ADDR
        value: "recommendationservice:8080"
      - name: SHIPPING_SERVICE_ADDR
        value: "shippingservice:50051"
      - name: CHECKOUT_SERVICE_ADDR
        value: "checkoutservice:5050"
      - name: AD_SERVICE_ADDR
        value: "adservice:9555"
      - name: SHOPPING_ASSISTANT_SERVICE_ADDR
        value: "shoppingassistantservice:80"
      - name: LOG_FORMAT
        value: "json"
  
    # resources:
    #   requests:
    #     cpu: 100m
    #     memory: 64Mi
    #   limits:
    #     cpu: 200m
    #     memory: 128Mi

    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

service:
  enabled: true
  type: ClusterIP
  name: http
  port: 80
  targetPort: 8080
  annotations:
    cloud.google.com/neg: '{"ingress": true}'

serviceAccount:
  create: true
  name: "frontend"

profiler_enabled: "true"


ingress:
    enabled: false
    host: dev.tanyadominicsheytech.eu


podDisruptionBudget:
  enabled: false # Default is off
  minAvailable: 1