deploymentName: recommendationservice-deployment
serviceName: recommendationservice

appLabel: recommendationservice
appName: recommendationservice
jobLabel: recommendationservice

replicaCount: 1

image:
  repository: us-central1-docker.pkg.dev/project-1cdbea51-6334-4e02-967/app-images/recommendationservice
  tag: "v0.1.20"
  pullPolicy: IfNotPresent

annotations:
  instrumentation.opentelemetry.io/inject-python: "true"

containers:
  - name: server
    ports:
      - containerPort: 8080
    env:
      - name: OTEL_SERVICE_NAME
        value: recommendationservice

    readinessProbe:
      periodSeconds: 5
      grpc:
        port: 8080
    livenessProbe:
      periodSeconds: 5
      grpc:
        port: 8080
    env:
      - name: PORT
        value: "8080"
      - name: PRODUCT_CATALOG_SERVICE_ADDR
        value: "productcatalogservice:3550"
      - name: DISABLE_PROFILER
        value: "1"
      - name: OTEL_SERVICE_NAME
        value: "recommendationservice"
    # resources:
    #   requests:
    #     cpu: 100m
    #     memory: 220Mi
    #   limits:
    #     cpu: 200m
    #     memory: 450Mi

    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

service:
  enabled: true
  type: ClusterIP
  name: grpc
  port: 8080
  targetPort: 8080

serviceAccount:
  create: true
  name: "recommendationservice"
  
profiler_enabled: "false"
