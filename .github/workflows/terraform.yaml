
name: Terraform

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      stack:
        description: "bootstrap or foundation"
        required: true
        default: foundation
        type: choice
        options:
          - bootstrap
          - foundation
      action:
        description: "plan or apply"
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  TF_IN_AUTOMATION: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform fmt and validate (bootstrap)
        run: |
          terraform -chdir=infra/terraform/envs/bootstrap init -backend=false
          terraform -chdir=infra/terraform/envs/bootstrap fmt -check -recursive
          terraform -chdir=infra/terraform/envs/bootstrap validate 

      - name: Terraform fmt and validate (foundation)
        run: |
          terraform -chdir=infra/terraform/envs/foundation init -backend=false
          terraform -chdir=infra/terraform/envs/foundation fmt -check -recursive
          terraform -chdir=infra/terraform/envs/foundation validate

  plan-apply:
    if: github.event_name == 'workflow_dispatch' || (github.ref == 'refs/heads/main' && github.event_name == 'push')
    needs: [validate]
    runs-on: ubuntu-latest
    environment: terraform
    steps:
      - uses: actions/checkout@v4

      - name: Get GitHub Runner Public IP
        id: get_ip
        run: |
          RUNNER_IP=$(curl -s -4 https://api.ipify.org)
          echo "ip=${RUNNER_IP}" >> $GITHUB_OUTPUT

      - name: Authenticate via GCP OIDC Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_TERRAFORM_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Write CI Terraform variables
        working-directory: infra/terraform/envs/${{ github.event.inputs.stack || 'foundation' }}
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID || steps.auth.outputs.project_id }}
          REGION: ${{ vars.GCP_REGION || 'us-central1' }}
          BUILD_CI_SA: ${{ secrets.GCP_BUILD_SA }}
          PROMOTE_CI_SA: ${{ secrets.GCP_PROMOTE_SA }}
          TFSTATE_BUCKET: ${{ vars.TFSTATE_BUCKET_NAME }}
          DNS_ZONE: ${{ vars.DNS_ZONE_NAME || 'tanyadominicsheytech-eu' }}
          DNS_DOMAIN: ${{ vars.DNS_DOMAIN || 'tanyadominicsheytech-eu.' }}
          MASTER_AUTH_NETS: ${{ vars.GCP_MASTER_AUTHORIZED_NETWORKS_JSON || '[]' }}
          GITHUB_ORG: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
          RUNNER_IP: ${{ steps.get_ip.outputs.ip }}
        run: |
          set -euo pipefail
          STACK="${{ github.event.inputs.stack || 'foundation' }}"

          if [ -z "${PROJECT_ID}" ]; then
            echo "::error::Repository variable GCP_PROJECT_ID is not set."
            exit 1
          fi

          if [ "$STACK" = "bootstrap" ]; then
            BUCKET="${TFSTATE_BUCKET:-tfstate-${PROJECT_ID}}"
            cat > ci.auto.tfvars.json <<EOF
          {
            "project_id": "${PROJECT_ID}",
            "region": "${REGION}",
            "tfstate_bucket_name": "${BUCKET}",
            "github_org": "${GITHUB_ORG}",
            "github_repo": "${GITHUB_REPO}"
          }
          EOF
          else
            BUILD_SA="${BUILD_CI_SA:-sa-build-ci@${PROJECT_ID}.iam.gserviceaccount.com}"
            PROMOTE_SA="${PROMOTE_CI_SA:-sa-promote-ci@${PROJECT_ID}.iam.gserviceaccount.com}"
            
            echo '${MASTER_AUTH_NETS}' > initial_nets.json
            jq --arg ip "${RUNNER_IP}/32" '. += [{"cidr_block": $ip, "display_name": "github-actions-runner"}]' initial_nets.json > dynamic_nets.json

            cat > ci.auto.tfvars.json <<EOF
          {
            "project_id": "${PROJECT_ID}",
            "region": "${REGION}",
            "build_ci_sa_email": "${BUILD_SA}",
            "promote_ci_sa_email": "${PROMOTE_SA}",
            "dns_zone_name": "${DNS_ZONE}",
            "dns_domain": "${DNS_DOMAIN}",
            "master_authorized_networks": $(cat dynamic_nets.json)
          }
          EOF
          fi

          echo "Generated ci.auto.tfvars.json for ${STACK}:"
          jq 'del(.master_authorized_networks) | . + {master_authorized_networks: "<redacted>"}' ci.auto.tfvars.json

      - name: Terraform init/plan/apply
        working-directory: infra/terraform/envs/${{ github.event.inputs.stack || 'foundation' }}
        run: |
          terraform init -input=false
          
          ACTION="${{ github.event.inputs.action || 'plan' }}"
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            ACTION="apply"
          fi

          if [ "${ACTION}" = "apply" ]; then
            terraform apply -input=false -auto-approve
          else
            terraform plan -input=false
          fi

